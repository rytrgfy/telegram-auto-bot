name: Telegram Auto Message

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Send Random Message
        run: |
          messages=(
            "Hey Rani Just checking in how are you feeling today"
            "You are stronger than you think Keep going"
            "Everything will be okay Take it one step at a time"
            "You matter Never forget that"
            "Even tough days do not last forever"
            "Stay positive better days are coming"
            "Take a deep breath You have got this"
            "You are not alone I am here for you"
          )

          count=${#messages[@]}
          index=$((RANDOM % count))
          message="${messages[$index]}"

          curl -s -X POST https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.CHAT_ID }} \
          -d text="$message"
